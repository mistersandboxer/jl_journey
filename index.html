<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JULEELAND</title>

<style>
  :root { --cycle: 17s; }

  body {
    margin: 0;
    min-height: 100vh;
    background: #fbfaf4;
    color: #111;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .wrap {
    width: min(92vw, 720px);
    padding: 24px;
  }

  .hidden { display: none; }

  h1 {
    letter-spacing: 0.12em;
    font-size: clamp(2rem, 7vw, 4.8rem);
    margin: 0 0 24px;
    font-weight: 700;
  }

  .story-text {
    font-size: clamp(1.15rem, 4vw, 1.55rem);
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 34px;
  }

  svg {
    width: min(76vw, 440px);
    height: auto;
    overflow: visible;
  }

  .stem, .seed {
    fill: none;
    stroke: #111;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .core {
    fill: none;
    stroke: #111;
    stroke-width: 3;
  }

  .dandelion {
    animation: sway 4.8s ease-in-out infinite;
    transform-origin: 250px 455px;
  }

  .core-group {
    animation: tremble 2.6s ease-in-out infinite;
  }

  .attached-seed {
    animation: attachedSeed var(--cycle) ease-in-out infinite;
  }

  .float-seed {
    opacity: 0;
    animation: floatAway var(--cycle) cubic-bezier(.42, 0, .25, 1) infinite;
  }

  .float-seed.seed-1 { animation-delay: 0s; }
  .float-seed.seed-2 { animation-delay: 1.25s; }
  .float-seed.seed-3 { animation-delay: 2.5s; }
  .float-seed.seed-4 { animation-delay: 3.75s; }
  .float-seed.seed-5 { animation-delay: 5s; }
  .float-seed.seed-6 { animation-delay: 6.25s; }
  .float-seed.seed-7 { animation-delay: 7.5s; }

  button {
    margin-top: 30px;
    padding: 14px 26px;
    border: 2px solid #111;
    background: transparent;
    color: #111;
    font-size: 1rem;
    letter-spacing: .12em;
    cursor: pointer;
    font-family: Georgia, serif;
  }

  button:hover {
    background: #111;
    color: #fbfaf4;
  }

  .seed-registry {
    display: block;
    margin: 22px auto 0;
    width: 42px;
    height: 42px;
    border: 2px solid #111;
    border-radius: 50%;
    background: #fbfaf4;
    color: #111;
    cursor: pointer;
    font-size: 22px;
    padding: 0;
    line-height: 1;
  }

  .seed-registry:hover {
    background: #111;
    color: #fbfaf4;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(251,250,244,.94);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 24px;
  }

  .modal.open { display: flex; }

  .modal-box {
    max-width: 420px;
    border: 2px solid #111;
    padding: 28px;
    background: #fbfaf4;
  }

  .modal-box h2 {
    letter-spacing: .1em;
    margin-top: 0;
  }

  .modal-box input,
  .modal-box select {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: 1px solid #111;
    background: #fff;
    font-family: Georgia, serif;
    font-size: 1rem;
    box-sizing: border-box;
  }

  .small {
    font-size: .82rem;
    line-height: 1.4;
    margin-top: 12px;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  @keyframes tremble {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(1.5px,-1.5px); }
  }

  @keyframes attachedSeed {
    0%, 7% {
      opacity: 1;
      transform: scale(1);
    }

    10%, 86% {
      opacity: 0;
      transform: scale(.12);
    }

    92%, 100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes floatAway {
    0%, 7% {
      opacity: 0;
      transform: translate(0,0) rotate(0deg) scale(1);
    }

    10% {
      opacity: 1;
      transform: translate(6px,-10px) rotate(5deg) scale(1);
    }

    22% {
      opacity: .92;
      transform: translate(28px,-48px) rotate(-18deg) scale(.95);
    }

    36% {
      opacity: .82;
      transform: translate(12px,-92px) rotate(12deg) scale(.88);
    }

    50% {
      opacity: .62;
      transform: translate(62px,-138px) rotate(-28deg) scale(.76);
    }

    64% {
      opacity: .42;
      transform: translate(38px,-188px) rotate(22deg) scale(.58);
    }

    78% {
      opacity: .16;
      transform: translate(96px,-250px) rotate(-8deg) scale(.38);
    }

    88%, 100% {
      opacity: 0;
      transform: translate(145px,-330px) rotate(36deg) scale(.15);
    }
  }
</style>
</head>

<body>

<div class="modal" id="seedModal">
  <div class="modal-box">
    <h2>THE SEED REGISTRY</h2>
    <p>The road remembers some travelers. Most are forgotten.</p>

    <input type="text" placeholder="What name shall JULEELAND know you by?" />
    <input type="email" placeholder="Email address" />

    <select>
      <option>Choose your Seedlight</option>
      <option>Wonder</option>
      <option>Memory</option>
      <option>Dreams</option>
      <option>Courage</option>
      <option>Mischief</option>
    </select>

    <button onclick="fakeSignup()">PLANT MY SEED</button>
    <button onclick="closeSeedRegistry()">CLOSE</button>

    <p class="small">
      Placeholder only. Later this will connect to your Google Form or mailing list.
    </p>
  </div>
</div>

<main class="wrap">

  <section id="landing">
    <div id="dandelionArt"></div>

    <button onclick="showIntro()">BEGIN THE DRIFT</button>

    <button class="seed-registry" onclick="openSeedRegistry()" title="Seed Registry">
      ✦
    </button>
  </section>

  <section id="intro" class="hidden">
    <h1>JULEELAND</h1>
    <div class="story-text">
      Some roads are walked.<br>
      Some are remembered.<br>
      JULEELAND is neither.
    </div>
    <button onclick="showFirstScene()">CONTINUE</button>
  </section>

  <section id="firstScene" class="hidden">
    <div class="story-text">
      A drifting seed lands in your hand.<br>
      It feels strangely familiar.
    </div>
    <button onclick="alert('Soon: Follow the seed.')">FOLLOW THE SEED</button>
    <button onclick="alert('Soon: Let it go.')">LET IT GO</button>
    <button onclick="alert('Soon: Ask where it came from.')">ASK WHERE IT CAME FROM</button>
  </section>

</main>

<script>
const dandelionSVG = `
<svg viewBox="0 0 520 620" aria-label="Animated black line dandelion">
  <g class="dandelion">
    <path class="stem" d="M250 515 C240 420, 245 315, 260 220" />
    <path class="stem" d="M248 430 C205 390, 182 350, 158 310" />
    <path class="stem" d="M252 410 C300 375, 330 335, 358 295" />

    <g class="core-group">
      <circle class="core" cx="260" cy="205" r="18" />
    </g>

    <g class="attached-seed" style="transform-origin:260px 118px;">
      <line class="seed" x1="260" y1="205" x2="260" y2="120" />
      <circle class="seed" cx="260" cy="118" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:208px 138px;">
      <line class="seed" x1="260" y1="205" x2="210" y2="140" />
      <circle class="seed" cx="208" cy="138" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:312px 138px;">
      <line class="seed" x1="260" y1="205" x2="310" y2="140" />
      <circle class="seed" cx="312" cy="138" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:178px 205px;">
      <line class="seed" x1="260" y1="205" x2="180" y2="205" />
      <circle class="seed" cx="178" cy="205" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:342px 205px;">
      <line class="seed" x1="260" y1="205" x2="340" y2="205" />
      <circle class="seed" cx="342" cy="205" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:203px 262px;">
      <line class="seed" x1="260" y1="205" x2="205" y2="260" />
      <circle class="seed" cx="203" cy="262" r="7" />
    </g>

    <g class="attached-seed" style="transform-origin:317px 262px;">
      <line class="seed" x1="260" y1="205" x2="315" y2="260" />
      <circle class="seed" cx="317" cy="262" r="7" />
    </g>
  </g>

  <g class="float-seed seed-1">
    <path class="seed" d="M260 120 C278 70, 318 35, 370 10" />
    <circle class="seed" cx="374" cy="7" r="6" />
  </g>

  <g class="float-seed seed-2">
    <path class="seed" d="M208 138 C230 90, 265 50, 310 20" />
    <circle class="seed" cx="315" cy="17" r="6" />
  </g>

  <g class="float-seed seed-3">
    <path class="seed" d="M312 138 C350 100, 392 60, 440 30" />
    <circle class="seed" cx="445" cy="27" r="6" />
  </g>

  <g class="float-seed seed-4">
    <path class="seed" d="M178 205 C205 155, 245 110, 285 70" />
    <circle class="seed" cx="290" cy="66" r="6" />
  </g>

  <g class="float-seed seed-5">
    <path class="seed" d="M342 205 C390 170, 430 125, 465 78" />
    <circle class="seed" cx="469" cy="73" r="6" />
  </g>

  <g class="float-seed seed-6">
    <path class="seed" d="M203 262 C230 210, 270 160, 320 115" />
    <circle class="seed" cx="325" cy="111" r="6" />
  </g>

  <g class="float-seed seed-7">
    <path class="seed" d="M317 262 C365 225, 410 175, 455 125" />
    <circle class="seed" cx="459" cy="120" r="6" />
  </g>
</svg>
`;

document.getElementById("dandelionArt").innerHTML = dandelionSVG;

function hideAll() {
  document.getElementById("landing").classList.add("hidden");
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("firstScene").classList.add("hidden");
}

function showIntro() {
  hideAll();
  document.getElementById("intro").classList.remove("hidden");
}

function showFirstScene() {
  hideAll();
  document.getElementById("firstScene").classList.remove("hidden");
}

function openSeedRegistry() {
  document.getElementById("seedModal").classList.add("open");
}

function closeSeedRegistry() {
  document.getElementById("seedModal").classList.remove("open");
}

function fakeSignup() {
  alert("A Wish Keeper has recorded your journey.");
  closeSeedRegistry();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JULEELAND</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #fbfaf4;
    color: #111;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .wrap {
    width: min(92vw, 720px);
    padding: 24px;
  }

  h1 {
    letter-spacing: 0.18em;
    font-size: clamp(2rem, 8vw, 4.5rem);
    margin: 0 0 10px;
  }

  .line {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-style: italic;
    margin-bottom: 28px;
  }

  svg {
    width: min(88vw, 520px);
    height: auto;
    overflow: visible;
  }

  .stem, .seed, .wind, .puff {
    fill: none;
    stroke: #111;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dandelion {
    animation: sway 4s ease-in-out infinite;
    transform-origin: 250px 430px;
  }

  .wind {
    animation: windMove 3s linear infinite;
    opacity: .65;
  }

  .wind.two { animation-delay: .8s; }
  .wind.three { animation-delay: 1.5s; }

  .loose-seed {
    animation: floatSeed 5s ease-in-out infinite;
  }

  .loose-seed.two { animation-delay: 1s; }
  .loose-seed.three { animation-delay: 2s; }

  .puff {
    animation: tremble 2s ease-in-out infinite;
  }

  button {
    margin-top: 30px;
    padding: 14px 26px;
    border: 2px solid #111;
    background: transparent;
    font-size: 1rem;
    letter-spacing: .12em;
    cursor: pointer;
  }

  button:hover {
    background: #111;
    color: #fbfaf4;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  @keyframes windMove {
    0% { transform: translateX(-20px); opacity: 0; }
    30% { opacity: .7; }
    100% { transform: translateX(80px); opacity: 0; }
  }

  @keyframes floatSeed {
    0% { transform: translate(0,0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(95px,-80px) rotate(25deg); opacity: 0; }
  }

  @keyframes tremble {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(2px,-2px); }
  }
</style>
</head>

<body>
  <main class="wrap">
    <h1>JULEELAND</h1>
    <div class="line">“You don’t play JULEELAND. You remember your way into it.”</div>

    <svg viewBox="0 0 520 520" aria-label="Animated black line dandelion">
      <path class="wind" d="M40 180 C120 155, 170 190, 245 165" />
      <path class="wind two" d="M20 245 C110 220, 180 255, 275 230" />
      <path class="wind three" d="M75 315 C150 290, 225 320, 330 295" />

      <g class="dandelion">
        <path class="stem" d="M250 455 C240 370, 245 295, 260 220" />
        <path class="stem" d="M248 380 C205 345, 185 320, 160 285" />
        <path class="stem" d="M252 365 C300 335, 330 305, 355 270" />

        <circle class="puff" cx="260" cy="205" r="18" />

        <g class="puff">
          <line x1="260" y1="205" x2="260" y2="120" />
          <line x1="260" y1="205" x2="210" y2="140" />
          <line x1="260" y1="205" x2="310" y2="140" />
          <line x1="260" y1="205" x2="180" y2="205" />
          <line x1="260" y1="205" x2="340" y2="205" />
          <line x1="260" y1="205" x2="205" y2="260" />
          <line x1="260" y1="205" x2="315" y2="260" />

          <circle cx="260" cy="118" r="7" />
          <circle cx="208" cy="138" r="7" />
          <circle cx="312" cy="138" r="7" />
          <circle cx="178" cy="205" r="7" />
          <circle cx="342" cy="205" r="7" />
          <circle cx="203" cy="262" r="7" />
          <circle cx="317" cy="262" r="7" />
        </g>
      </g>

      <g class="loose-seed">
        <line class="seed" x1="365" y1="130" x2="390" y2="95" />
        <circle class="seed" cx="394" cy="90" r="6" />
      </g>

      <g class="loose-seed two">
        <line class="seed" x1="385" y1="210" x2="415" y2="180" />
        <circle class="seed" cx="420" cy="175" r="6" />
      </g>

      <g class="loose-seed three">
        <line class="seed" x1="330" y1="285" x2="360" y2="250" />
        <circle class="seed" cx="365" cy="245" r="6" />
      </g>
    </svg>

    <br />
    <button onclick="beginDrift()">BEGIN THE DRIFT</button>
  </main>

<script>
function beginDrift() {
  alert("The seed heard you. The road remembers.");
}
</script>
</body>
</html>

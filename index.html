<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JULEELAND</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #fbfaf4;
    color: #111;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .wrap {
    width: min(92vw, 720px);
    padding: 24px;
  }

  h1 {
    letter-spacing: 0.12em;
    font-size: clamp(2rem, 7vw, 4.8rem);
    margin: 0 0 12px;
    font-weight: 700;
  }

  .line {
    font-size: clamp(.9rem, 2.8vw, 1.2rem);
    font-style: italic;
    margin-bottom: 42px;
  }

  svg {
    width: min(74vw, 430px);
    height: auto;
    overflow: visible;
  }

  .stem, .seed, .puff {
    fill: none;
    stroke: #111;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dandelion {
    animation: sway 4.5s ease-in-out infinite;
    transform-origin: 250px 455px;
  }

  .puff {
    animation: tremble 2.4s ease-in-out infinite;
  }

  .attached-seed.release-one {
    animation: vanishSeed 5s ease-in-out infinite;
    transform-origin: 340px 205px;
  }

  .attached-seed.release-two {
    animation: vanishSeed 5s ease-in-out infinite;
    animation-delay: 1.2s;
    transform-origin: 312px 138px;
  }

  .attached-seed.release-three {
    animation: vanishSeed 5s ease-in-out infinite;
    animation-delay: 2.1s;
    transform-origin: 317px 262px;
  }

  .loose-seed {
    opacity: 0;
    animation: floatSeed 5s ease-in-out infinite;
  }

  .loose-seed.two { animation-delay: 1.2s; }
  .loose-seed.three { animation-delay: 2.1s; }

  button {
    margin-top: 30px;
    padding: 14px 26px;
    border: 2px solid #111;
    background: transparent;
    font-size: 1rem;
    letter-spacing: .12em;
    cursor: pointer;
  }

  button:hover {
    background: #111;
    color: #fbfaf4;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  @keyframes tremble {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(1.5px,-1.5px); }
  }

  @keyframes vanishSeed {
    0%, 35% { opacity: 1; transform: scale(1); }
    45%, 88% { opacity: 0; transform: scale(.25); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes floatSeed {
    0%, 34% { opacity: 0; transform: translate(0,0) rotate(0deg); }
    45% { opacity: 1; }
    65% { transform: translate(45px,-35px) rotate(-8deg); }
    100% { opacity: 0; transform: translate(125px,-95px) rotate(22deg); }
  }
</style>
</head>

<body>
  <main class="wrap">
    <h1>JULEELAND</h1>
    <div class="line">“You don’t play JULEELAND. You remember your way into it.”</div>

    <svg viewBox="0 0 520 520" aria-label="Animated black line dandelion">
      <g class="dandelion">
        <path class="stem" d="M250 455 C240 370, 245 295, 260 220" />
        <path class="stem" d="M248 380 C205 345, 185 320, 160 285" />
        <path class="stem" d="M252 365 C300 335, 330 305, 355 270" />

        <circle class="puff" cx="260" cy="205" r="18" />

        <g class="puff">
          <line x1="260" y1="205" x2="260" y2="120" />
          <line x1="260" y1="205" x2="210" y2="140" />
          <line x1="260" y1="205" x2="180" y2="205" />
          <line x1="260" y1="205" x2="205" y2="260" />

          <circle cx="260" cy="118" r="7" />
          <circle cx="208" cy="138" r="7" />
          <circle cx="178" cy="205" r="7" />
          <circle cx="203" cy="262" r="7" />
        </g>

        <g class="attached-seed release-two">
          <line class="seed" x1="260" y1="205" x2="310" y2="140" />
          <circle class="seed" cx="312" cy="138" r="7" />
        </g>

        <g class="attached-seed release-one">
          <line class="seed" x1="260" y1="205" x2="340" y2="205" />
          <circle class="seed" cx="342" cy="205" r="7" />
        </g>

        <g class="attached-seed release-three">
          <line class="seed" x1="260" y1="205" x2="315" y2="260" />
          <circle class="seed" cx="317" cy="262" r="7" />
        </g>
      </g>

      <g class="loose-seed">
        <path class="seed" d="M342 205 C370 180, 395 148, 420 118" />
        <circle class="seed" cx="424" cy="113" r="6" />
        <path class="seed" d="M424 113 C416 108, 412 101, 410 94" />
        <path class="seed" d="M424 113 C429 104, 437 101, 444 98" />
      </g>

      <g class="loose-seed two">
        <path class="seed" d="M312 138 C338 115, 365 91, 392 70" />
        <circle class="seed" cx="397" cy="66" r="6" />
        <path class="seed" d="M397 66 C389 61, 386 55, 384 48" />
        <path class="seed" d="M397 66 C404 58, 411 55, 418 53" />
      </g>

      <g class="loose-seed three">
        <path class="seed" d="M317 262 C350 235, 382 208, 410 180" />
        <circle class="seed" cx="415" cy="176" r="6" />
        <path class="seed" d="M415 176 C407 170, 404 164, 402 157" />
        <path class="seed" d="M415 176 C422 168, 430 165, 437 163" />
      </g>
    </svg>

    <br />
    <button onclick="beginDrift()">BEGIN THE DRIFT</button>
  </main>

<script>
function beginDrift() {
  alert("The seed heard you. The road remembers.");
}
</script>
</body>
</html>
